name: Test

on: [ 'push', 'pull_request' ]

jobs:
  psalm:
    name: php unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.2"
          - "8.3"
        composer:
          - ""
          - "--prefer-lowest"
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install Dependencies
        run: composer update ${{ matrix.composer }} --no-interaction --prefer-dist
      - name: Run tests
        run: composer test
